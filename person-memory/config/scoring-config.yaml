write_score:
  novelty: 0.30
  recurrence_likelihood: 0.20
  future_utility: 0.20
  explicitness: 0.15
  user_confirmed: 0.15
  thresholds:
    review_min: 0.50
    structured_write_min: 0.75

retrieval_score:
  semantic_similarity: 0.30
  keyword_match: 0.15
  scope_match: 0.10
  recency_boost: 0.10
  importance: 0.10
  strength: 0.10
  freshness: 0.05
  rerank_score: 0.10
  thresholds:
    reject_below: 0.35
    frontstage_min: 0.60
    strong_candidate_min: 0.80

pollution_risk:
  scope_mismatch: 0.25
  temporary_state_risk: 0.20
  outdatedness: 0.20
  excessive_length: 0.15
  conflict_risk: 0.10
  unclear_utility: 0.10
  thresholds:
    frontstage_max: 0.30
    background_max: 0.59
    suppress_min: 0.60

confidence:
  retrieval_quality: 0.30
  source_strength: 0.20
  scope_alignment: 0.15
  freshness: 0.15
  conflict_free: 0.10
  evidence_completeness: 0.10
  thresholds:
    cautious_min: 0.60
    normal_min: 0.80

delivery_sufficiency_score:
  task_fit: 0.35
  execution_readiness: 0.25
  user_intent_fit: 0.20
  confidence: 0.20
  thresholds:
    escalate_below: 0.50
    sufficient_min: 0.75
