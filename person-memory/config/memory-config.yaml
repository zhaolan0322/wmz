paths:
  data_root: data/runtime_data
  metadata_db: data/runtime_data/index/metadata.db
  archive_root: data/runtime_data/memory/archive
  protected_root: data/runtime_data/protected
  trace_log: data/runtime_data/memory/logs/decision_trace.jsonl
  global_entry_doc: data/runtime_data/protected/entry.md
  classification_rules_doc: data/runtime_data/protected/classification_rules.md

runtime:
  default_language: zh-CN
  memory_mode: summary_first
  auto_retrieval_enabled: true
  max_frontstage_candidates: 3
  embedding_dimensions: 64

layers:
  core_auto_inject: stable_only
  working_auto_inject: same_scope_only
  dynamic_auto_inject: explicit_only
  procedural_auto_inject: same_scope_only
  raw_auto_inject: never

protected:
  safe_mode_on_integrity_failure: true
  manifest_file: protected_manifest.json
